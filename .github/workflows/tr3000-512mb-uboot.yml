name: TR3000 512MB Multi-Layout U-Boot

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as a pre-release'
        required: false
        type: boolean
        default: true
      branch:
        description: 'Source branch for bl-mt798x-dhcpd'
        required: false
        type: string
        default: 'master'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  WRT_REPO: https://github.com/ShawnRn/bl-mt798x-dhcpd
  WRT_BRANCH: ${{ github.event.inputs.branch }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox || true
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix bison build-essential device-tree-compiler flex gcc-aarch64-linux-gnu libssl-dev qemu-user-static
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          sudo mkdir -p /mnt/build_wrt
          sudo chown "$USER:$USER" /mnt/build_wrt
          sudo ln -s /mnt/build_wrt "$GITHUB_WORKSPACE/wrt"

      - name: Clone source
        run: |
          git clone --depth=1 --single-branch --branch "$WRT_BRANCH" "$WRT_REPO" ./wrt/

      - name: Apply TR3000 512MB reference files
        run: |
          cd ./wrt/
          cp -f tr3000-512-reference/mt7981_cudy_tr3000-v1_multi_layout_defconfig \
            ./uboot-mtk-20230718-09eda825/configs/
          cp -f tr3000-512-reference/mt7981-cudy-tr3000-v1.dts \
            ./uboot-mtk-20230718-09eda825/arch/arm/dts/
          cp -f tr3000-512-reference/index.html \
            ./uboot-mtk-20230718-09eda825/failsafe/fsdata/index.html

      - name: Build TR3000 512MB multi-layout FIP
        run: |
          cd ./wrt/
          SOC=mt7981 BOARD=cudy_tr3000-v1 VERSION=2023 VARIANT=default MULTI_LAYOUT=1 SILENT=Y ./build.sh

      - name: Package firmware
        run: |
          cd ./wrt/
          mkdir -p ./upload/
          WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d")
          echo "WRT_DATE=$WRT_DATE" >> "$GITHUB_ENV"
          find ./output/ -type f -iname "*fip*.bin" -print -exec cp {} ./upload/ \;

      - name: Generate release tag
        id: tag
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="TR3000-512M-MultiLayout-Uboot-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          cat > release.txt << EOF
          ## TR3000 512MB Multi-Layout U-Boot / FIP

          Release: $RELEASE_TAG
          Source: $WRT_REPO
          Branch: $WRT_BRANCH
          ATF: atf-20231013-0ea67d76a
          MTK U-Boot: uboot-mtk-20230718-09eda825
          Device: Cudy TR3000 v1, 512MB flash, fixed-parts multi-layout

          This build follows the 512MB reference configuration from zhuannn/cudy-tr3000-512:
          U-Boot 202307 + default variant + MULTI_LAYOUT=1 + nmbm0 fixed MTD layouts.

          Expected Linux layout for the target device:
          mtd5 ubi offset 0x5c0000, size 0x1ea00000.

          In U-Boot WebUI choose the layout:
          mod-490m
          EOF
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TR3000_512M_Uboot_FIP_${{ env.WRT_DATE }}
          path: ./wrt/upload/*.bin

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ./wrt/upload/*.bin
